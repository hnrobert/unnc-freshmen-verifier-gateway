services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - unnc-freshmen-verifier-gateway-app-data:/app/data
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/app.db
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    restart: unless-stopped

volumes:
  unnc-freshmen-verifier-gateway-app-data:
