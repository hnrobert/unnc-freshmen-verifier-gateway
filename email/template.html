<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>{{TITLE}}</title>
    <style>
      /* Dark mode — honored by Apple Mail / iOS / clients that support
         prefers-color-scheme. Light is the inline default everywhere else. */
      @media (prefers-color-scheme: dark) {
        .bg { background-color: #1c1917 !important; }
        .surface { background-color: #292524 !important; }
        .rule { border-color: #44403c !important; }
        .ink { color: #f5f5f4 !important; }
        .body-ink { color: #d6d3d1 !important; }
        .muted { color: #a8a29e !important; }
      }
    </style>
  </head>
  <body class="bg" style="margin: 0; padding: 0; background-color: #f5f5f4;">
    <!-- preheader (hidden preview text) -->
    <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; mso-hide: all">{{PREHEADER}}</div>

    <table role="presentation" class="bg" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f4;">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table role="presentation" class="surface" width="600" cellpadding="0" cellspacing="0" style="width: 100%; max-width: 600px; background-color: #ffffff; border: 1px solid #e7e5e4; border-radius: 16px; overflow: hidden;">
            <!-- Brand header (primary-colored logo mark — renders in every client) -->
            <tr>
              <td class="rule" style="padding: 22px 28px; border-bottom: 1px solid #e7e5e4;">
                <span style="display: inline-block; vertical-align: middle; width: 32px; height: 32px; line-height: 32px; text-align: center; background-color: #F7D447; color: #1c1917; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700;">U</span>
                <span class="ink" style="margin-left: 10px; vertical-align: middle; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #1c1917;">UNNC Freshmen Verifier Gateway</span>
              </td>
            </tr>
            <!-- Content -->
            <tr>
              <td style="padding: 28px;">
                <h1 class="ink" style="margin: 0 0 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; line-height: 1.3; color: #1c1917;">{{TITLE}}</h1>
                <div class="body-ink" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.65; color: #44403c;">{{BODY}}</div>
                {{ACTION_BLOCK}}
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td class="rule" style="padding: 20px 28px; border-top: 1px solid #e7e5e4;">
                <p class="muted" style="margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; line-height: 1.5; color: #78716c;">Sent by UNNC Freshmen Verifier Gateway · © {{YEAR}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
